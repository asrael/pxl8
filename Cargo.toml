[package]
name = "pxl8"
version = "0.1.0"
edition = "2021"
authors = ["asrael <asrael@pxl8.org>"]
license = "zlib"

[dependencies]
libc = "0.2"
nanoserde = { git = "https://github.com/not-fl3/nanoserde", default-features = false, features = ["ron"] }

[build-dependencies]
bindgen = { version = "0.70", optional = true }

[features]
default = []
gen-ffi = ["bindgen"]

[profile.dev.package."*"]
opt-level = 3

[profile.dev]
opt-level = 1
panic = "abort"

[profile.release]
codegen-units = 1
lto = true
panic = "abort"
strip = "debuginfo"

[profile.wasm-release]
inherits = "release"
opt-level = "s"
